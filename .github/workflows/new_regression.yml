name: Parallel Jobs per File (ops + uat with env)

on:
  workflow_dispatch:

jobs:
  generate-chunks:
    runs-on: ubuntu-latest
    outputs:
      chunk1: ${{ steps.set.outputs.chunk1 }}
      chunk2: ${{ steps.set.outputs.chunk2 }}
      chunk3: ${{ steps.set.outputs.chunk3 }}
      chunk4: ${{ steps.set.outputs.chunk4 }}
      chunk5: ${{ steps.set.outputs.chunk5 }}
    steps:
      - uses: actions/checkout@v4
      - id: set
        run: |
          shopt -s nullglob
          files=(tests/cmr/l2ss-py/ops/* tests/cmr/l2ss-py/uat/*)
          total=${#files[@]}
          total=11
          chunk_size=250  # Stay under 256 matrix limit
          chunk_size=3
          num_chunks=5

          files=(
              "tests/cmr/l2ss-py/uat/C1261072650-POCLOUD"
              "tests/cmr/l2ss-py/uat/C1275819072-LAADSCDUAT"
              "tests/cmr/l2ss-py/uat/C1261072651-POCLOUD"
              "tests/cmr/l2ss-py/uat/C1233405381-GES_DISC"
              "tests/cmr/l2ss-py/uat/C1268674275-GES_DISC"
              "tests/cmr/l2ss-py/uat/C1258816710-ASDC_DEV2"
              "tests/cmr/l2ss-py/uat/C1261072650-POCLOUD"
              "tests/cmr/l2ss-py/uat/C1240739526-POCLOUD"
              "tests/cmr/l2ss-py/uat/C1215667655-GES_DISC"
              "tests/cmr/l2ss-py/uat/C1240557252-GES_DISC"
              "tests/cmr/l2ss-py/uat/C1215720436-GES_DISC"
            )

          for i in $(seq 0 $((num_chunks - 1))); do
            [ $i -ge 5 ] && break
            
            start=$((i * chunk_size))
            chunk=("${files[@]:start:chunk_size}")
            
            [ ${#chunk[@]} -eq 0 ] && continue
            
            json=$(printf '%s\n' "${chunk[@]}" \
              | jq -R 'split("/") | {env: .[-2], file: .[-1]}' \
              | jq -s '{include: .}')
            
            {
              echo "chunk$((i+1))<<EOF"
              echo "$json"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          done

  process-chunk-1:
    needs: generate-chunks
    if: needs.generate-chunks.outputs.chunk1 != ''
    uses: ./.github/workflows/process_chunk.yml
    secrets: inherit
    with:
      chunk-data: ${{ needs.generate-chunks.outputs.chunk1 }}

  process-chunk-2:
    needs: generate-chunks
    if: needs.generate-chunks.outputs.chunk2 != ''
    uses: ./.github/workflows/process_chunk.yml
    secrets: inherit
    with:
      chunk-data: ${{ needs.generate-chunks.outputs.chunk2 }}

  process-chunk-3:
    needs: generate-chunks
    if: needs.generate-chunks.outputs.chunk3 != ''
    uses: ./.github/workflows/process_chunk.yml
    secrets: inherit
    with:
      chunk-data: ${{ needs.generate-chunks.outputs.chunk3 }}

  process-chunk-4:
    needs: generate-chunks
    if: needs.generate-chunks.outputs.chunk4 != ''
    uses: ./.github/workflows/process_chunk.yml
    secrets: inherit
    with:
      chunk-data: ${{ needs.generate-chunks.outputs.chunk4 }}

  process-chunk-5:
    needs: generate-chunks
    if: needs.generate-chunks.outputs.chunk5 != ''
    uses: ./.github/workflows/process_chunk.yml
    secrets: inherit
    with:
      chunk-data: ${{ needs.generate-chunks.outputs.chunk5 }}