name: Parallel Jobs per File (ops + uat with env)

on:
  workflow_dispatch:

jobs:
  generate-chunks:
    runs-on: ubuntu-latest
    outputs:
      chunk1: ${{ steps.set.outputs.chunk1 }}
      chunk2: ${{ steps.set.outputs.chunk2 }}
      chunk3: ${{ steps.set.outputs.chunk3 }}
      chunk4: ${{ steps.set.outputs.chunk4 }}
      chunk5: ${{ steps.set.outputs.chunk5 }}
    steps:
      - uses: actions/checkout@v4
      - id: set
        run: |
          shopt -s nullglob
          files=(tests/cmr/l2ss-py/ops/* tests/cmr/l2ss-py/uat/*)
          total=${#files[@]}
          total=11
          chunk_size=250  # Stay under 256 matrix limit
          chunk_size=1
          num_chunks=5

          files=(
              "tests/cmr/l2ss-py/uat/C1261072650-POCLOUD"
            )

          for i in $(seq 0 $((num_chunks - 1))); do
            [ $i -ge 5 ] && break
            
            start=$((i * chunk_size))
            chunk=("${files[@]:start:chunk_size}")
            
            [ ${#chunk[@]} -eq 0 ] && continue
            
            json=$(printf '%s\n' "${chunk[@]}" \
              | jq -R 'split("/") | {env: .[-2], file: .[-1]}' \
              | jq -s '{include: .}')
            
            {
              echo "chunk$((i+1))<<EOF"
              echo "$json"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          done

  process-chunk-1:
    needs: generate-chunks
    if: needs.generate-chunks.outputs.chunk1 != ''
    uses: ./.github/workflows/process_chunk.yml
    secrets: inherit
    with:
      chunk-data: ${{ needs.generate-chunks.outputs.chunk1 }}

  process-chunk-2:
    needs: generate-chunks
    if: needs.generate-chunks.outputs.chunk2 != ''
    uses: ./.github/workflows/process_chunk.yml
    secrets: inherit
    with:
      chunk-data: ${{ needs.generate-chunks.outputs.chunk2 }}

  process-chunk-3:
    needs: generate-chunks
    if: needs.generate-chunks.outputs.chunk3 != ''
    uses: ./.github/workflows/process_chunk.yml
    secrets: inherit
    with:
      chunk-data: ${{ needs.generate-chunks.outputs.chunk3 }}

  process-chunk-4:
    needs: generate-chunks
    if: needs.generate-chunks.outputs.chunk4 != ''
    uses: ./.github/workflows/process_chunk.yml
    secrets: inherit
    with:
      chunk-data: ${{ needs.generate-chunks.outputs.chunk4 }}

  process-chunk-5:
    needs: generate-chunks
    if: needs.generate-chunks.outputs.chunk5 != ''
    uses: ./.github/workflows/process_chunk.yml
    secrets: inherit
    with:
      chunk-data: ${{ needs.generate-chunks.outputs.chunk5 }}

  aggregate-failures:
    needs:
      - process-chunk-1
      - process-chunk-2
      - process-chunk-3
      - process-chunk-4
      - process-chunk-5
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download all job status artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: job-status-*
          path: job-status

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_SERVICES_UAT }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_SERVICES_UAT }}
          aws-region: us-west-2

      - name: Aggregate failed jobs and print URLs and reasons
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          REGRESSION_ENV: "UAT"
          CMR_USER: ${{ secrets.CMR_USER }}
          CMR_PASS: ${{ secrets.CMR_PASS }}
        run: |
          python3 tests/aggregate_results.py