name: Process Chunk

on:
  workflow_call:
    inputs:
      chunk-data:
        required: true
        type: string
      max-parallel:
        required: false
        type: number
        default: 2    
    secrets:
      CMR_USER:
        required: true
      CMR_PASS:
        required: true
permissions:
  actions: read   # needed to query jobs API
  contents: read  # optional, if accessing repo files
jobs:
  process:
    runs-on: ubuntu-latest
    env:
      CMR_USER: ${{ secrets.CMR_USER }}
      CMR_PASS: ${{ secrets.CMR_PASS }}
    strategy:
      max-parallel: ${{ inputs.max-parallel }}
      fail-fast: false
      matrix: ${{ fromJson(inputs.chunk-data) }}
    steps:

      - name: Print env and file
        run: echo "Env=${{ matrix.env }} File=${{ matrix.file }}"

      - name: Checkout Repository
        uses: actions/checkout@v4
    
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Poetry
        uses: abatilo/actions-poetry@v3
        with:
          poetry-version: 2.1.3

      - name: Poetry Install
        run: poetry install

      - name: Get matrix job URL
        run: |
          echo "Fetching job URL for matrix job (env=${{ matrix.env }}, file=${{ matrix.file }})..."
          MATRIX_JOB_URL=$(curl -s \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "${{ github.api_url }}/repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs" \
            | jq -r --arg ENV "${{ matrix.env }}" --arg FILE "${{ matrix.file }}" \
              '.jobs[] | select(.name == ("process (" + $ENV + ", " + $FILE + ")")) | .html_url')
          
          echo "Job URL: ${MATRIX_JOB_URL:-Not yet available}"
          echo "MATRIX_JOB_URL=$MATRIX_JOB_URL" >> "$GITHUB_ENV"


      - name: Run Regression
        working-directory: tests
        run: |
          poetry run pytest verify_collection.py --env ${{ matrix.env }} --concept_id ${{ matrix.file }}
